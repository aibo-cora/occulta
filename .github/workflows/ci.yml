name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  test:
    name: Unit Tests
    runs-on: macos-26

    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.2.app

      - name: List simulators
        run: xcrun simctl list devices available

      - name: Boot simulator
        run: |
          xcrun simctl boot "iPhone 17" || true
          xcrun simctl bootstatus "iPhone 17" -b

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Occulta.xcodeproj \
            -scheme OccultaTests \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log | xcpretty --report junit --output test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            xcodebuild.log

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: OccultaTests
          path: test-results.xml
          reporter: java-junit
