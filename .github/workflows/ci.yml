name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  test:
    name: Unit Tests
    runs-on: macos-latest

    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.2.app

      - name: Setup simulator
        run: |
          xcrun simctl delete "OccultaCI" 2>/dev/null || true
          UDID=$(xcrun simctl create "OccultaCI" "iPhone 16" "com.apple.CoreSimulator.SimRuntime.iOS-26-2")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Occulta.xcodeproj \
            -scheme OccultaTests \
            -destination "id=$SIM_UDID" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log | xcpretty --report junit --output test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            xcodebuild.log

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: OccultaTests
          path: test-results.xml
          reporter: java-junit
